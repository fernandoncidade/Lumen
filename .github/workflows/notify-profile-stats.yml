name: Notificar repo do perfil para atualizar estatísticas

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar repository_dispatch no repo do perfil
        env:
          PROFILE_REPO_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PROFILE_REPO_TOKEN}" \
            https://api.github.com/repos/fernandoncidade/fernandoncidade/dispatches \
            -d '{"event_type":"update-stats"}'
